<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
 <div class="blog-post-card">
     <img class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="a computer screen with coding files being open">
   <div class="post-content">
       <h2 class="post-title">Coding with Freecodecamp</h2>
       <p class="post-excerpt">Learn to code on Freecodecamp and gain critical skills to give you a massive headstart on your developer journey.</p>
       <a class="read-more" href="https://freecodecamp.org">Read More</a>
   </div>      
 </div>    
</body>
</html>
