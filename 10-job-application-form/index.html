<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>
  <main>
      <div class="container">
          <form>
              <h1>Job Application Job</h1>
              <input type="text" id="name" required>
              <label for="name">Full Name</label>
              <input type="email" id="email" required>
              <label for="email">Email</label>
              <select id="position">
                  <option value="position"
>Select a position</option>
                  <option value="junior">Junior Developer</option>
                  <option value="developer">Developer</option>
                  <option value="designer">Designer</option>
                  <option value="manager">Manager</option>
              </select>
              <fieldset class="radio-group">
                  <legend>Availability</legend>
                  <input type="radio" id="radio-1" name="availability" checked>
                  <label for="radio-1">Full-Time</label>
                  <input type="radio" id="radio-2" name="availability">
                  <label for="radio-2">Part- Time</label>
                  <textarea id="message">Write your motivation</textarea>
                  <button type="submit" id="sbmt-btn">Submit</button>
          </form>
      </div>
  </main>    
</body>
</html>
