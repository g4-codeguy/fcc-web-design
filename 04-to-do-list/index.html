<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>My To-Do list</h1>
    <ul class="todo-list">
      <li>
          <input type="checkbox" id="notes">
          <label for="notes">Create detailed CSS notes</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="https://github.com/g4-codeguy" target="_blank">g4-codeguy/github</a>
            </li>
          </ul>  
      </li>
      <li>
        <input type="checkbox" id="live-page">
        <label for="live-page">Convert code to live pages on GitHub</label>
        <ul class="sub-item">
          <li><a class="sub-item-link" href="https:/github.com/g4-codeguy/pages" target="_blank">g4-codeguy/pages</a>
          </li>
        </ul>
        </li>  
        <li>
          <input type="checkbox" id="revise">
          <label for="revise">Revise for Responsive Web design exam</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="https://www.freecodecamp.org" target="_blank">Revise at Freecodecamp</a>
            </li>  
          </ul>      
        </li>
        <li>
          <input type="checkbox" id="project">
          <label for="project">Start my own project</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="https://github.com/g4-codeguy" target="_blank">Github-Home</a>
            </li>  
          </ul>      
        </li>    
    </ul>  

</body>

</html>
