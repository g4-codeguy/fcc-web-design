<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="form-container"> 
     <form>  
       <h2>Contact Form</h2>
       <label for="name-label">Name:</label>
       <input required class="enter-name" type="text" id="name-label" name="name">
       <label for="email-label">Email:</label>
       <input required class="enter-email" type="email" id="email-label" name="email">
       <label for="textarea">Message:</label>
       <textarea rows="4" cols="20" id="textarea" name="text-area" placeholder="Leave your message here.." required></textarea>
       <button type="submit">Submit</button>
     </form>    
  </div>
</body>

</html>
