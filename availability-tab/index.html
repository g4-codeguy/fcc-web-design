<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Table</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
  <table cols="3" rows="5">
    <thead>
    </thead>
    <tr>
      <th>Monday</th>
      <th>Tuesday</th>
      <th>Wednesday</th> 
      <th>Thursday</th>
      <th>Friday</th>
    </tr>   
    <tbody>
        <tr class="row-bottom">
          <th class="time">9:00am</th>
          <td class="available-0"></td>
          <td class="available-1"></td>
          <td class="available-2"></td>
          <td class="available-3"></td>
          <td class="available-4"></td>
        </tr>
        <tr class="row-bottom">
          <th class="time">10:00am</th>
          <td class="available-4"></td>
          <td class="available-3"></td>
          <td class="available-2"></td>
          <td class="available-1"></td>
          <td class="available-0"></td>
        </tr>
        <tr class="row-bottom">
          <th class="time">11:00am</th>
          <td class="available-1"></td>
          <td class="available-2"></td>
          <td class="available-3"></td>
          <td class="available-4"></td>
          <td class="available-5"></td>
        </tr>
        <tr class="row-bottom">
          <th class="time">12:00pm</th>
         <td class="available-4"></td>
          <td class="available-1"></td>
          <td class="available-0"></td>
          <td class="available-3"></td>
          <td class="available-5"></td>
        </tr>
        <tr class="row-bottom">
          <th class="time">1:00pm</th>
          <td class="available-3"></td>
          <td class="available-0"></td>
          <td class="available-1"></td>
          <td class="available-5"></td>
          <td class="available-2"></td>
        </tr>
        <tr class="row-bottom">
          <th class="time">2:00pm</th>
          <td class="available-5"></td>
          <td class="available-0"></td>
          <td class="available-2"></td>
          <td class="available-1"></td>
          <td class="available-4"></td>
        </tr>
        <tr class="row-bottom">
          <th class="time">3:00pm</th>
          <td class="available-0"></td>
          <td class="available-2"></td>
          <td class="available-5"></td>
          <td class="available-4"></td>
          <td class="available-5"></td>
        </tr>
        <tr>
          <th class="time">4:00pm</th>
          <td class="available-1"></td>
          <td class="available-5"></td>
          <td class="available-4"></td>
          <td class="available-2"></td>
          <td class="available-0"></td>
        </tr>
    </tbody>        
  </table>  

</body>

</html>
